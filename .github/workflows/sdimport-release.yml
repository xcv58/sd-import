name: SD Import Release

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "Marketing version, for example 1.0 or 1.1.1"
        required: true
        default: "1.0"
      app_build:
        description: "Monotonically increasing build number"
        required: true
        default: "1"
      release_tag:
        description: "Release tag. Defaults to v<app_version> when empty."
        required: false
        default: ""
      release_title:
        description: "Release title. Defaults to SD Import <app_version> when empty."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ inputs.app_version }}
      APP_BUILD: ${{ inputs.app_build }}
      RELEASE_TAG: ${{ inputs.release_tag != '' && inputs.release_tag || format('v{0}', inputs.app_version) }}
      RELEASE_TITLE: ${{ inputs.release_title != '' && inputs.release_title || format('SD Import {0}', inputs.app_version) }}
      DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
      SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$DEVELOPER_ID_CERTIFICATE_P12_BASE64" || -z "$DEVELOPER_ID_CERTIFICATE_PASSWORD" ]]; then
            echo "Developer ID certificate secrets are required." >&2
            exit 2
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/sdimport-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$DEVELOPER_ID_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Release SD Import
        run: ./script/release_github.sh
